version: 0.1
dev:
  deploy:
    parameters:
      stack_name: github-runner-autoscaler
      region: us-east-2
      resolve_s3: true
      s3_prefix: github-runner-autoscaler
      capabilities: CAPABILITY_IAM
      parameter_overrides:
        - GitHubPATSecretName=github-runner-autoscaler-pat
        - ExtraRunnerLabels=dev
        - >-
          RunnerConfiguration={
            "us-east-2":{
              "ami":"0c0c88099397fccb4",
              "subnet":"subnet-0123456789def",
              "sg":["sg-0123456789def"],
              "key":"terraform-2025051801"
            },
            "ap-southeast-5":{
              "ami":"0c0c88099397fccb4",
              "subnet":"subnet-0123456789def",
              "sg":["sg-0123456789def"],
              "key":"terraform-2025051801"
            }
          }
